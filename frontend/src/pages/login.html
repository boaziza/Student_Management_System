<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — School Portal</title>
  <link rel="stylesheet" href="../styles/styles.css"/>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <h1>School Portal</h1>
      <p>Student and Parent Management System</p>
    </div>

    <h2 class="auth-title">Sign in to your account</h2>

    <div id="alert-box"></div>

    <form id="login-form">
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="you@example.com" required/>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required/>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:4px" id="submit-btn">
        Sign In
      </button>
    </form>

    <div class="auth-link">
      Don't have an account? <a href="register.html">Register here</a>
    </div>
  </div>
</div>

<script src="../services/api.js"></script>
<script src="../components/login.js"></script>
</body>
</html>
