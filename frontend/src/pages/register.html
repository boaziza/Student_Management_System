<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — School Portal</title>
  <link rel="stylesheet" href="../styles/styles.css"/>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card" style="max-width:500px">
    <div class="auth-logo">
      <h1>School Portal</h1>
      <p>Create your account</p>
    </div>

    <h2 class="auth-title">Register</h2>
    <div id="alert-box"></div>

    <form id="register-form">
      <div class="form-row">
        <div class="form-group">
          <label>First Name</label>
          <input type="text" id="first_name" placeholder="John" required/>
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input type="text" id="last_name" placeholder="Doe" required/>
        </div>
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" required/>
      </div>

      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" id="phone" placeholder="+250 700 000 000"/>
      </div>

      <div class="form-group">
        <label>Account Type</label>
        <select id="role" required>
          <option value="">Select role…</option>
          <option value="student">Student</option>
          <option value="parent">Parent</option>
        </select>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="••••••••" required/>
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" id="confirm_password" placeholder="••••••••" required/>
        </div>
      </div>

      <div class="alert alert-info" style="margin-bottom:16px;font-size:12px">
        Note: After registration, an admin must verify your device before you can log in.
      </div>

      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center" id="submit-btn">
        Create Account
      </button>
    </form>

    <div class="auth-link">
      Already have an account? <a href="login.html">Sign in</a>
    </div>
  </div>
</div>

<script src="../services/api.js"></script>
<script src="../components/register.js"></script>
</body>
</html>
